name: Android Build

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual build request'

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: UnityProject/BrainAcademy/Library
          key: Library-Android-${{ hashFiles('UnityProject/BrainAcademy/Assets/**', 'UnityProject/BrainAcademy/Packages/**', 'UnityProject/BrainAcademy/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android APK
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          projectPath: UnityProject/BrainAcademy
          unityVersion: auto
          targetPlatform: Android
          buildMethod: BuildAndroid.Build
          allowDirtyBuild: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BrainAcademy-Android
          path: UnityProject/BrainAcademy/Builds/*.apk
          retention-days: 14
