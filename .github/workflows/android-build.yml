name: Android Build

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for manual build'
        required: false
        default: 'Manual build request'

jobs:
  android:
    name: Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Unity
        uses: RageAgainstThePixel/unity-setup@v1
        with:
          build-targets: Android

      - name: Activate Unity License
        uses: RageAgainstThePixel/activate-unity-license@v1
        with:
          license: Personal
          username: ${{ secrets.UNITY_USERNAME }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: UnityProject/BrainAcademy/Library
          key: Library-Android-${{ hashFiles('UnityProject/BrainAcademy/Assets/**', 'UnityProject/BrainAcademy/Packages/**', 'UnityProject/BrainAcademy/ProjectSettings/**') }}
          restore-keys: |
            Library-Android-
            Library-

      - name: Build Android APK
        run: |
          "$UNITY_EDITOR_PATH" \
            -projectPath UnityProject/BrainAcademy \
            -batchmode -nographics -quit \
            -executeMethod BuildAndroid.Build \
            -logFile -

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BrainAcademy-Android
          path: UnityProject/BrainAcademy/Builds/*.apk
          retention-days: 14
